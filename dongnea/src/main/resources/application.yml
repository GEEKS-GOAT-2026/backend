spring:
  config:
    import: classpath:application-secret.yml

  application:
    name: dongnea-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/dongnea_db
    username: admin
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    geeks.dongnea: DEBUG

# Frontend integration (development default). Change in application-secret.yml or environment for staging/production.
app:
  frontend:
    redirect-uri: http://localhost:3000
