spring:
  config:
    import: optional:classpath:application-secret.yml

  application:
    name: dongnea-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dongnea_db}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:DEBUG}
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:DEBUG}
    geeks.dongnea: ${LOGGING_LEVEL_GEEKS_DONGNEA:DEBUG}

# Frontend integration (development default). Change in application-secret.yml or environment for staging/production.
app:
  frontend:
    redirect-uri: ${APP_FRONTEND_REDIRECT_URI:http://localhost:3000/login}
  storage:
    supabase-url: ${SUPABASE_URL:}
    secret-key: ${SUPABASE_SECRET_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:club-images}
    max-file-size: ${IMAGE_MAX_SIZE:5242880}
